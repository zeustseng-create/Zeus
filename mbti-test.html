<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI 人格測驗</title>
<style>
  :root {
    --bg: #0b0f19;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #e2e8f0;
    --muted: #94a3b8;
    --primary: #60a5fa;
    --accent: #f472b6;
    --shadow: 0 0 40px rgba(96,165,250,0.15);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 40px 20px; }
  .hidden { display: none !important; }

  /* Intro */
  .intro { text-align: center; padding: 60px 0; }
  .intro h1 { font-size: 2.5rem; margin-bottom: 12px; background: linear-gradient(90deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .intro p { color: var(--muted); font-size: 1.1rem; max-width: 480px; margin: 0 auto 32px; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px; padding: 14px 36px; border-radius: 999px;
    border: none; font-size: 1rem; font-weight: 600; cursor: pointer;
    background: linear-gradient(135deg, var(--primary), #818cf8);
    color: #fff; box-shadow: var(--shadow); transition: transform .2s;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn-ghost {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); box-shadow: none;
  }

  /* Progress */
  .progress-wrap { margin-bottom: 24px; }
  .progress-top { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-bottom: 8px; }
  .progress-bar { height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #818cf8); border-radius: 3px; transition: width .5s ease; }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px;
    backdrop-filter: blur(12px);
  }
  .card .label {
    font-size: .75rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); font-weight: 600;
  }
  .card h2 { font-size: 1.6rem; margin-top: 12px; font-weight: 600; line-height: 1.5; }

  /* Options */
  .options { margin-top: 32px; display: grid; gap: 12px; }
  .option {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px; border-radius: 16px;
    border: 1px solid var(--border); background: rgba(255,255,255,0.02);
    cursor: pointer; transition: all .2s; text-align: left; width: 100%; color: var(--text);
  }
  .option:hover { border-color: var(--primary); background: rgba(255,255,255,0.05); }
  .option-title { font-size: 1.1rem; font-weight: 600; }
  .option-sub { font-size: .85rem; color: var(--muted); margin-top: 2px; }
  .option-arrow { font-size: 1.4rem; color: var(--muted); transition: all .2s; }
  .option:hover .option-arrow { color: var(--primary); transform: translateX(4px); }

  /* Back */
  .back-btn {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: .85rem; padding: 6px 12px; border-radius: 999px; transition: background .2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .back-btn:disabled { opacity: .3; cursor: not-allowed; }

  /* Result */
  .result-hero {
    background: linear-gradient(135deg, var(--primary), #818cf8);
    padding: 2px; border-radius: 24px; box-shadow: var(--shadow);
  }
  .result-hero-inner {
    background: rgba(11,15,25,.85); border-radius: 22px; padding: 40px;
    backdrop-filter: blur(12px);
  }
  .result-code { font-size: 4rem; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .result-name { font-size: 1.5rem; font-weight: 600; }
  .result-nick { color: var(--muted); font-size: .9rem; }
  .result-tagline { margin-top: 16px; font-size: 1.1rem; color: var(--muted); font-style: italic; }

  .section { margin-top: 20px; }
  .section h3 { font-size: .8rem; text-transform: uppercase; letter-spacing: .1em; color: var(--primary); margin-bottom: 12px; }
  .section p { color: var(--muted); }
  .section ul { list-style: none; padding: 0; margin: 0; }
  .section li { display: flex; align-items: center; gap: 10px; color: var(--muted); padding: 4px 0; }
  .section li::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }
  .pill { display: inline-block; padding: 6px 14px; border-radius: 999px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); font-size: .85rem; color: var(--muted); margin: 4px 6px 4px 0; }

  .actions { margin-top: 32px; display: flex; gap: 12px; flex-wrap: wrap; }
  .actions .btn { flex: 1; min-width: 140px; }

  /* Types list */
  .types-grid { display: grid; gap: 12px; }
  .type-row {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 20px; border-radius: 16px;
    border: 1px solid var(--border); background: rgba(255,255,255,0.02);
    cursor: pointer; transition: all .2s; text-decoration: none; color: inherit;
  }
  .type-row:hover { border-color: var(--primary); background: rgba(255,255,255,0.05); }
  .type-code { font-size: 1.3rem; font-weight: 700; width: 56px; flex-shrink: 0; }
  .type-info { flex: 1; }
  .type-info .name { font-weight: 600; }
  .type-info .nick { font-size: .85rem; color: var(--muted); }
  .type-tagline { font-size: .85rem; color: var(--muted); font-style: italic; flex: 1; text-align: right; }

  @media (max-width: 600px) {
    .intro h1 { font-size: 2rem; }
    .result-code { font-size: 3rem; }
    .card { padding: 24px; }
    .type-tagline { display: none; }
  }
</style>
</head>
<body>

<!-- Intro -->
<div id="page-intro" class="container">
  <div class="intro">
    <h1>MBTI 人格測驗</h1>
    <p>回答 28 道題目，找出你屬於 16 種人格類型中的哪一種。</p>
    <button class="btn" onclick="startTest()">開始測驗 →</button>
    <div style="margin-top:16px;">
      <button class="btn btn-ghost" onclick="showTypes()">瀏覽 16 型人格</button>
    </div>
  </div>
</div>

<!-- Test -->
<div id="page-test" class="container hidden">
  <div class="progress-wrap">
    <div class="progress-top">
      <span id="progress-label">題目 1 / 28</span>
      <button class="back-btn" id="back-btn" onclick="goBack()" disabled>← 上一題</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div class="card" id="question-card">
    <div class="label" id="question-label">Question 01</div>
    <h2 id="question-text">載入中…</h2>
    <div class="options">
      <button class="option" onclick="answer('a')">
        <div>
          <div class="option-title">符合</div>
          <div class="option-sub">這聽起來就是我</div>
        </div>
        <span class="option-arrow">→</span>
      </button>
      <button class="option" onclick="answer('b')">
        <div>
          <div class="option-title">不符合</div>
          <div class="option-sub">我並非如此</div>
        </div>
        <span class="option-arrow">→</span>
      </button>
    </div>
  </div>
</div>

<!-- Result -->
<div id="page-result" class="container hidden">
  <a href="#" class="back-btn" onclick="goHome(); return false;" style="display:inline-block;margin-bottom:16px;">← 回首頁</a>

  <div class="result-hero" id="result-hero">
    <div class="result-hero-inner">
      <div style="font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);font-weight:600;">你的人格類型</div>
      <div style="margin-top:12px;display:flex;flex-wrap:wrap;align-items:baseline;gap:12px 24px;">
        <div class="result-code" id="res-code">INTJ</div>
        <div>
          <div class="result-name" id="res-name">建築師</div>
          <div class="result-nick" id="res-nick">The Architect</div>
        </div>
      </div>
      <div class="result-tagline" id="res-tagline">…</div>
    </div>
  </div>

  <div class="card section" style="margin-top:20px;">
    <h3>人格描述</h3>
    <p id="res-desc">…</p>
  </div>

  <div style="display:grid;gap:20px;margin-top:20px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));">
    <div class="card section">
      <h3>優勢</h3>
      <ul id="res-strengths"></ul>
    </div>
    <div class="card section">
      <h3 style="color:var(--accent)">挑戰</h3>
      <ul id="res-weaknesses"></ul>
    </div>
  </div>

  <div class="card section" style="margin-top:20px;">
    <h3 style="color:var(--muted)">適合的職涯方向</h3>
    <div id="res-careers" style="margin-top:8px;"></div>
  </div>

  <div class="actions">
    <button class="btn" onclick="startTest()">重新測驗</button>
    <button class="btn btn-ghost" onclick="showTypes()">看其他類型</button>
  </div>
</div>

<!-- Types list -->
<div id="page-types" class="container hidden">
  <a href="#" class="back-btn" onclick="goHome(); return false;" style="display:inline-block;margin-bottom:16px;">← 回首頁</a>
  <h1 style="margin-bottom:24px;font-size:1.8rem;">16 型人格一覽</h1>
  <div class="types-grid" id="types-grid"></div>
</div>

};

let current = 0;
let answers = {};

function showPage(id) {
  ['page-intro','page-test','page-result','page-types'].forEach(p => {
    document.getElementById(p).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
  window.scrollTo(0,0);
}

function startTest() {
  current = 0; answers = {};
  renderQuestion();
  showPage('page-test');
}

function renderQuestion() {
  const q = questions[current];
  document.getElementById('question-label').textContent = 'Question ' + String(current+1).padStart(2,'0');
  document.getElementById('question-text').textContent = q.text;
  document.getElementById('progress-label').textContent = '題目 ' + (current+1) + ' / ' + questions.length;
  document.getElementById('progress-fill').style.width = ((current / questions.length) * 100) + '%';
  document.getElementById('back-btn').disabled = current === 0;

  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeIn .5s ease';
}

function answer(v) {
  const q = questions[current];
  answers[q.id] = v;
  if (current + 1 < questions.length) {
    current++;
    renderQuestion();
  } else {
    showResult();
  }
}

function goBack() {
  if (current > 0) { current--; renderQuestion(); }
}

function computeType() {
  const s = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  for (const q of questions) {
    const ans = answers[q.id];
    if (!ans) continue;
    const letter = ans === 'a' ? q.a : q.b;
    s[letter]++;
  }
  const pick = (a,b) => s[a] >= s[b] ? a : b;
  return pick('E','I') + pick('S','N') + pick('T','F') + pick('J','P');
}

function showResult() {
  const code = computeType();
  const t = types[code];
  if (!t) return;

  document.getElementById('res-code').textContent = t.code;
  document.getElementById('res-name').textContent = t.name;
  document.getElementById('res-nick').textContent = t.nick;
  document.getElementById('res-tagline').textContent = '「' + t.tagline + '」';
  document.getElementById('res-desc').textContent = t.desc;
  document.getElementById('res-hero').style.background = t.grad;

  const sl = document.getElementById('res-strengths');
  sl.innerHTML = t.strengths.map(s => '<li>'+s+'</li>').join('');
  const wl = document.getElementById('res-weaknesses');
  wl.innerHTML = t.weaknesses.map(s => '<li><span style="background:var(--accent);width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0;"></span>'+s+'</li>').join('');

  const cc = document.getElementById('res-careers');
  cc.innerHTML = t.careers.map(c => '<span class="pill">'+c+'</span>').join('');

  showPage('page-result');
}

function showTypes() {
  const grid = document.getElementById('types-grid');
  grid.innerHTML = '';
  Object.values(types).forEach(t => {
    const el = document.createElement('a');
    el.className = 'type-row';
    el.href = '#';
    el.onclick = () => { showTypeDetail(t.code); return false; };
    el.innerHTML = `
      <div class="type-code" style="background:${t.grad};-webkit-background-clip:text;-webkit-text-fill-color:transparent;">${t.code}</div>
      <div class="type-info"><div class="name">${t.name}</div><div class="nick">${t.nick}</div></div>
      <div class="type-tagline">${t.tagline}</div>
    `;
    grid.appendChild(el);
  });
  showPage('page-types');
}

function showTypeDetail(code) {
  const t = types[code];
  if (!t) return;
  document.getElementById('res-code').textContent = t.code;
  document.getElementById('res-name').textContent = t.name;
  document.getElementById('res-nick').textContent = t.nick;
  document.getElementById('res-tagline').textContent = '「' + t.tagline + '」';
  document.getElementById('res-desc').textContent = t.desc;
  document.getElementById('res-hero').style.background = t.grad;
  document.getElementById('res-strengths').innerHTML = t.strengths.map(s => '<li>'+s+'</li>').join('');
  document.getElementById('res-weaknesses').innerHTML = t.weaknesses.map(s => '<li><span style="background:var(--accent);width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0;"></span>'+s+'</li>').join('');
  document.getElementById('res-careers').innerHTML = t.careers.map(c => '<span class="pill">'+c+'</span>').join('');
  showPage('page-result');
}

function goHome() {
  showPage('page-intro');
}

// Animate in keyframes
const style = document.createElement('style');
style.textContent = `
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
`;
document.head.appendChild(style);
</script>

</body>
</html>
