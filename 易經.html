<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>六爻占卜器（真實隨機停下）</title>
<style>
body{font-family:sans-serif;text-align:center;}
button{font-size:18px;padding:8px 20px;margin:5px;}
#coinArea{margin:20px;}
.coin{
  display:inline-block;
  width:60px;height:60px;
  border-radius:50%;
  border:2px solid black;
  margin:10px;
  line-height:60px;font-size:24px;
  transform-style:preserve-3d;
  transition: transform 0.2s;
  position:relative;
}
.coin .front,.coin .back{
  position:absolute;width:60px;height:60px;
  backface-visibility:hidden;text-align:center;line-height:60px;font-size:24px;
}
.coin .back{transform:rotateY(180deg);}
.yang{width:120px;height:10px;background:black;margin:6px auto;}
.yin{width:120px;height:10px;margin:6px auto;position:relative;}
.yin:before{content:"";width:50px;height:10px;background:black;position:absolute;left:0;}
.yin:after{content:"";width:50px;height:10px;background:black;position:absolute;right:0;}
table{margin:auto;margin-top:30px;font-size:18px;border-collapse:collapse;}
td,th{border:1px solid black;padding:8px;}
</style>
</head>
<body>

<h1>六爻占卜器（真實隨機停下）</h1>

<div id="coinArea">
  <div id="coin0" class="coin"><div class="front">正</div><div class="back">反</div></div>
  <div id="coin1" class="coin"><div class="front">正</div><div class="back">反</div></div>
  <div id="coin2" class="coin"><div class="front">正</div><div class="back">反</div></div>
</div>

<button onclick="startCoin()">開始翻銅錢</button>
<button onclick="stopCoin()">停止/下一個銅錢</button>
<h3 id="status">點「開始翻銅錢」</h3>

<h2>本卦</h2>
<div id="original"></div>
<h2>變卦</h2>
<div id="changed"></div>
<h2>卦名</h2>
<p id="hexagramName"></p>

<h2>伏羲八卦參閱表</h2>
<table>
<tr><th>卦</th><th>象</th><th>自然</th></tr>
<tr><td>乾</td><td>☰</td><td>天</td></tr>
<tr><td>坤</td><td>☷</td><td>地</td></tr>
<tr><td>震</td><td>☳</td><td>雷</td></tr>
<tr><td>巽</td><td>☴</td><td>風</td></tr>
<tr><td>坎</td><td>☵</td><td>水</td></tr>
<tr><td>離</td><td>☲</td><td>火</td></tr>
<tr><td>艮</td><td>☶</td><td>山</td></tr>
<tr><td>兌</td><td>☱</td><td>澤</td></tr>
</table>

<script>
// 六爻數據
let lines=[], original=[], changed=[];
let currentCoin=0, coinInterval=null;

// 開始翻當前銅錢
function startCoin(){
  if(currentCoin>=3) return;
  coinInterval=setInterval(()=>{
    let angle=Math.random()*360;
    document.getElementById('coin'+currentCoin).style.transform='rotateY('+angle+'deg)';
  },10);
  document.getElementById('status').innerText='翻動第 '+(currentCoin+1)+' 枚銅錢...';
}

// 停止當前銅錢（真正隨機決定正反）
function stopCoin(){
  clearInterval(coinInterval);

  // 真正隨機決定正面(3)或反面(2)
  let val = Math.random()<0.5?2:3;
  document.getElementById('coin'+currentCoin).style.transform = val==3?'rotateY(0deg)':'rotateY(180deg)';

  // 記錄
  coins[currentCoin]=val;

  currentCoin++;
  if(currentCoin>=3){
    // 計算爻
    let sum = coins[0]+coins[1]+coins[2];
    lines.push(sum);
    let o = (sum==7||sum==9)?1:0;
    let c = (sum==6)?1:(sum==9?0:o);
    original.push(o); changed.push(c);

    drawHex('original',original);
    drawHex('changed',changed);
    document.getElementById('status').innerText='第 '+lines.length+' 爻: '+sum;
    currentCoin=0;
    if(lines.length==6) showHexName();
  }
}

// 畫卦
function drawHex(id,data){
  let html='';
  for(let i=data.length-1;i>=0;i--){
    html+=data[i]? "<div class='yang'></div>":"<div class='yin'></div>";
  }
  document.getElementById(id).innerHTML=html;
}

// 顯示卦名
function showHexName(){
  let b=original.join(''), c=changed.join('');
  let name=hexagrams[b]||'未知', name2=hexagrams[c]||'未知';
  document.getElementById('hexagramName').innerHTML='本卦: '+name+'<br>變卦: '+name2;
}

// 保存每枚銅錢的值
let coins=[2,2,2];
const hexagrams={'111111':'乾','000000':'坤','010000':'師','111000':'泰','000111':'否','100101':'坎','101001':'離','000101':'臨','100111':'隨','010101':'井','101010':'困','001010':'解','011110':'巽','011101':'艮'};
</script>
</body>
</html>
