<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>易經占卜</title>

<style>

body{
font-family:sans-serif;
text-align:center;
}

button{
font-size:20px;
padding:10px 20px;
margin:10px;
}

.yang{
width:120px;
height:10px;
background:black;
margin:6px auto;
}

.yin{
width:120px;
height:10px;
margin:6px auto;
position:relative;
}

.yin:before{
content:"";
width:50px;
height:10px;
background:black;
position:absolute;
left:0;
}

.yin:after{
content:"";
width:50px;
height:10px;
background:black;
position:absolute;
right:0;
}

table{
margin:auto;
margin-top:30px;
font-size:18px;
border-collapse:collapse;
}

td,th{
border:1px solid black;
padding:8px;
}

</style>

</head>
<body>

<h1>易經銅錢占卜</h1>

<button onclick="throwCoins()">擲銅錢</button>

<h3 id="status">請開始占卜</h3>

<h2>本卦</h2>
<div id="original"></div>

<h2>變卦</h2>
<div id="changed"></div>

<script>

let lines=[]

function throwCoins(){

if(lines.length>=6){
alert("已完成六爻")
return
}

let coins=[]

for(let i=0;i<3;i++){
coins.push(Math.random()<0.5?2:3)
}

let sum=coins[0]+coins[1]+coins[2]

lines.push(sum)

document.getElementById("status").innerText=
"第 "+lines.length+" 爻："+sum

if(lines.length==6){
showHexagrams()
}

}

function showHexagrams(){

let original=[]
let changed=[]

for(let i=0;i<6;i++){

let v=lines[i]

let o
let c

// 本卦
if(v==7 || v==9) o=1
else o=0

// 變卦
if(v==6) c=1
else if(v==9) c=0
else c=o

original.push(o)
changed.push(c)

}

drawHexagram("original",original)
drawHexagram("changed",changed)

}

function drawHexagram(id,data){

let html=""

for(let i=5;i>=0;i--){

if(data[i]==1){
html+="<div class='yang'></div>"
}else{
html+="<div class='yin'></div>"
}

}

document.getElementById(id).innerHTML=html

}

</script>

<h2>伏羲八卦參閱表</h2>

<table>

<tr>
<th>卦</th>
<th>象</th>
<th>自然</th>
</tr>

<tr>
<td>乾</td>
<td>☰</td>
<td>天</td>
</tr>

<tr>
<td>坤</td>
<td>☷</td>
<td>地</td>
</tr>

<tr>
<td>震</td>
<td>☳</td>
<td>雷</td>
</tr>

<tr>
<td>巽</td>
<td>☴</td>
<td>風</td>
</tr>

<tr>
<td>坎</td>
<td>☵</td>
<td>水</td>
</tr>

<tr>
<td>離</td>
<td>☲</td>
<td>火</td>
</tr>

<tr>
<td>艮</td>
<td>☶</td>
<td>山</td>
</tr>

<tr>
<td>兌</td>
<td>☱</td>
<td>澤</td>
</tr>

</table>

</body>
</html>
