<!DOCTYPE html>

<title>強化遊戲選單網站</title>
<style>
  body {
    background-color: #f0f4f8;
    font-family: "Microsoft JhengHei", sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 30px;
    margin: 0;
  }

  #main-content {
    text-align: center;
    width: 800px;
  }

  h1 {
    color: #333;
    margin-bottom: 30px;
    text-shadow: 1px 1px 2px #aaa;
  }

  .game-button {
    display: block;
    width: 320px;
    margin: 15px auto;
    padding: 18px;
    font-size: 18px;
    font-weight: bold;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: linear-gradient(45deg, #4CAF50, #2E7D32);
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    transition: 0.3s;
  }

  .game-button:hover {
    transform: scale(1.05);
    background: linear-gradient(45deg, #66BB6A, #388E3C);
    box-shadow: 0 6px 10px rgba(0,0,0,0.3);
  }

  .ad-container {
    margin: 25px 0;
  }

  #side-ad {
    margin-left: 40px;
    width: 160px;
    min-height: 600px;
    display: flex;
    justify-content: center;
  }
</style>
